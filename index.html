<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>

</head>
<body>
    <h1>Calculator</h1>

    <div class="c_body">
        <div class="display">
            <h2 id="display"></h2>
        </div>

        <div class="row">
            <button type="button" class="num button" id="7">7</button>
            <button type="button" class="num button" id="8">8</button>
            <button type="button" class="num button" id="9">9</button>
            <button type="button" class="operation button" id="%">%</button>
        </div>
        <div class="row">
            <button type="button" class="num button" id="4">4</button>
            <button type="button" class="num button" id="5">5</button>
            <button type="button" class="num button" id="6">6</button>
            <button type="button" class="operation button" id="*">X</button>
        </div>
        <div class="row">
            <button type="button" class="num button" id="1">1</button>
            <button type="button" class="num button" id="2">2</button>
            <button type="button" class="num button" id="3">3</button>
            <button type="button" class="operation button" id="-">-</button>
        </div>
        <div class="row">
            <button type="button" class="num button" id="0">0</button>
            <button type="button" class="num button" id=".">.</button>
            <button type="button" class="equal operation button" id="=">=</button>
            <button type="button" class="operation button" id="+">+</button>
        </div>
        <div class="row">
            <button type="button" class="clear button operation" id="clear">AC</button>
            <button type="button" class="delete button operation" id="delete">Delete</button>
        </div>
            
    </div>
</body>
</html>
